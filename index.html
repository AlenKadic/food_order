<!doctype html>
<html lang="hr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Slatke narudžbe</title>

  <style>
    :root{
      --bg:#fff8ef;
      --card:#fffdf8;
      --cream:#fff4de;
      --choco:#3b2117;
      --choco-2:#5a3325;
      --caramel:#b9783b;
      --pistachio:#94b56f;
      --berry:#b9485b;
      --muted:#7a6256;
      --line:rgba(59,33,23,.14);
      --shadow:0 18px 45px rgba(59,33,23,.12);
      --radius:22px;
      --danger:#b23b3b;
      --ok:#477b3f;
      --warn:#b9783b;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(148,181,111,.22), transparent 35%),
        radial-gradient(circle at top right, rgba(185,120,59,.18), transparent 35%),
        var(--bg);
      color:var(--choco);
    }

    button,
    input,
    textarea{
      font:inherit;
    }

    button{
      cursor:pointer;
    }

    .page{
      width:min(1180px, calc(100% - 28px));
      margin:0 auto;
      padding:24px 0 80px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      margin-bottom:22px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .brand-badge{
      width:48px;
      height:48px;
      border-radius:16px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg, var(--choco), var(--caramel));
      color:#fff;
      font-size:24px;
      box-shadow:var(--shadow);
    }

    .brand h1{
      margin:0;
      font-size:clamp(24px, 4vw, 40px);
      letter-spacing:-.04em;
      line-height:1;
    }

    .brand p{
      margin:5px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .ghost-btn{
      border:1px solid var(--line);
      background:rgba(255,255,255,.72);
      color:var(--choco);
      border-radius:999px;
      padding:10px 14px;
      font-weight:750;
      box-shadow:0 8px 25px rgba(59,33,23,.06);
    }

    .hero{
      border:1px solid var(--line);
      background:linear-gradient(135deg, rgba(255,253,248,.92), rgba(255,244,222,.9));
      border-radius:30px;
      padding:24px;
      box-shadow:var(--shadow);
      margin-bottom:22px;
      overflow:hidden;
      position:relative;
    }

    .hero:after{
      content:"";
      position:absolute;
      right:-80px;
      top:-70px;
      width:220px;
      height:220px;
      border-radius:50%;
      background:rgba(148,181,111,.25);
    }

    .hero h2{
      margin:0 0 8px;
      font-size:clamp(26px, 5vw, 52px);
      letter-spacing:-.055em;
      line-height:.98;
      max-width:760px;
      position:relative;
      z-index:1;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      max-width:680px;
      line-height:1.5;
      position:relative;
      z-index:1;
    }

    .layout{
      display:grid;
      grid-template-columns:minmax(0, 1fr) 360px;
      gap:20px;
      align-items:start;
    }

    .section-title{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:12px;
      margin:4px 0 14px;
    }

    .section-title h3{
      margin:0;
      font-size:22px;
      letter-spacing:-.03em;
    }

    .section-title span{
      color:var(--muted);
      font-size:14px;
    }

    .products{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:16px;
    }

    .product-card{
      background:rgba(255,253,248,.94);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:18px;
      box-shadow:0 12px 30px rgba(59,33,23,.08);
      display:flex;
      flex-direction:column;
      min-height:100%;
    }

    .product-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:12px;
    }

    .product-emoji{
      width:58px;
      height:58px;
      border-radius:20px;
      background:var(--cream);
      display:grid;
      place-items:center;
      font-size:25px;
      flex:0 0 auto;
      border:1px solid var(--line);
    }

    .product-card h4{
      margin:0;
      font-size:20px;
      letter-spacing:-.035em;
      line-height:1.1;
    }

    .product-card .desc{
      margin:8px 0 14px;
      color:var(--muted);
      line-height:1.45;
      font-size:14px;
      flex:1;
    }

    .price{
      font-weight:900;
      color:var(--choco);
      white-space:nowrap;
    }

    .note-label{
      display:block;
      font-size:13px;
      color:var(--muted);
      margin:0 0 7px;
      font-weight:750;
    }

    .note-input{
      width:100%;
      min-height:74px;
      resize:vertical;
      border-radius:16px;
      border:1px solid var(--line);
      background:#fff;
      padding:11px 12px;
      color:var(--choco);
      outline:none;
      margin-bottom:12px;
    }

    .note-input:focus,
    .field:focus{
      border-color:rgba(185,120,59,.55);
      box-shadow:0 0 0 4px rgba(185,120,59,.12);
    }

    .product-actions{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .qty-control{
      display:flex;
      align-items:center;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      overflow:hidden;
      flex:0 0 auto;
    }

    .qty-control button{
      width:36px;
      height:38px;
      border:0;
      background:#fff;
      color:var(--choco);
      font-weight:900;
      font-size:18px;
    }

    .qty-control span{
      min-width:34px;
      text-align:center;
      font-weight:900;
    }

    .primary-btn{
      border:0;
      background:linear-gradient(135deg, var(--choco), var(--choco-2));
      color:#fff;
      border-radius:999px;
      padding:11px 16px;
      font-weight:900;
      box-shadow:0 12px 25px rgba(59,33,23,.18);
    }

    .primary-btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .secondary-btn{
      border:1px solid var(--line);
      background:#fff;
      color:var(--choco);
      border-radius:999px;
      padding:10px 14px;
      font-weight:850;
    }

    .add-btn{
      flex:1;
    }

    .cart-panel{
      position:sticky;
      top:18px;
      background:rgba(255,253,248,.96);
      border:1px solid var(--line);
      border-radius:26px;
      box-shadow:var(--shadow);
      padding:18px;
    }

    .cart-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
    }

    .cart-head h3{
      margin:0;
      font-size:22px;
      letter-spacing:-.035em;
    }

    .cart-count{
      background:var(--cream);
      border:1px solid var(--line);
      border-radius:999px;
      padding:5px 10px;
      color:var(--muted);
      font-weight:850;
      font-size:13px;
    }

    .empty{
      border:1px dashed rgba(59,33,23,.25);
      border-radius:18px;
      padding:16px;
      color:var(--muted);
      text-align:center;
      line-height:1.4;
      background:rgba(255,244,222,.45);
    }

    .cart-items{
      display:grid;
      gap:10px;
      margin:0 0 14px;
      max-height:360px;
      overflow:auto;
      padding-right:4px;
    }

    .cart-item{
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
      background:#fff;
    }

    .cart-item-main{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }

    .cart-item-title{
      font-weight:900;
      line-height:1.2;
    }

    .cart-item-sub{
      margin-top:4px;
      color:var(--muted);
      font-size:13px;
    }

    .cart-note{
      margin-top:9px;
      padding:9px 10px;
      background:rgba(148,181,111,.12);
      border:1px solid rgba(148,181,111,.32);
      border-radius:14px;
      color:#49623b;
      font-size:13px;
      line-height:1.35;
    }

    .cart-note strong{
      display:block;
      margin-bottom:3px;
    }

    .cart-item-actions{
      display:flex;
      align-items:center;
      gap:8px;
      margin-top:10px;
    }

    .mini-btn{
      border:1px solid var(--line);
      background:#fff;
      color:var(--choco);
      width:32px;
      height:32px;
      border-radius:999px;
      font-weight:900;
    }

    .remove-btn{
      margin-left:auto;
      border:0;
      background:transparent;
      color:var(--danger);
      font-weight:850;
      padding:6px;
    }

    .cart-total{
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-top:1px solid var(--line);
      padding-top:12px;
      margin-top:6px;
      font-weight:950;
      font-size:18px;
    }

    .customer-box{
      display:grid;
      gap:9px;
      margin-top:14px;
    }

    .field{
      width:100%;
      border:1px solid var(--line);
      background:#fff;
      border-radius:15px;
      padding:11px 12px;
      outline:none;
      color:var(--choco);
    }

    .submit-row{
      display:flex;
      gap:10px;
      margin-top:12px;
    }

    .submit-row .primary-btn{
      flex:1;
    }

    .status-msg{
      margin-top:12px;
      padding:11px 12px;
      border-radius:15px;
      font-size:14px;
      line-height:1.35;
      display:none;
    }

    .status-msg.show{
      display:block;
    }

    .status-msg.ok{
      background:rgba(71,123,63,.12);
      border:1px solid rgba(71,123,63,.28);
      color:var(--ok);
    }

    .status-msg.err{
      background:rgba(178,59,59,.1);
      border:1px solid rgba(178,59,59,.25);
      color:var(--danger);
    }

    .mobile-cart-bar{
      display:none;
    }

    .cart-drawer{
      display:none;
    }

    .modal{
      position:fixed;
      inset:0;
      z-index:50;
      display:none;
      align-items:stretch;
      justify-content:center;
      padding:18px;
    }

    .modal.open{
      display:flex;
    }

    .modal-backdrop{
      position:absolute;
      inset:0;
      background:rgba(35,20,14,.55);
      backdrop-filter:blur(4px);
    }

    .modal-card{
      position:relative;
      width:min(1080px, 100%);
      max-height:calc(100vh - 36px);
      overflow:auto;
      background:var(--card);
      border-radius:28px;
      box-shadow:0 25px 80px rgba(0,0,0,.28);
      border:1px solid var(--line);
      padding:18px;
    }

    .modal-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }

    .modal-top h3{
      margin:0;
      font-size:24px;
      letter-spacing:-.04em;
    }

    .close-btn{
      border:1px solid var(--line);
      background:#fff;
      color:var(--choco);
      width:40px;
      height:40px;
      border-radius:999px;
      font-weight:950;
    }

    .admin-login{
      display:grid;
      gap:10px;
      max-width:420px;
      margin:30px auto;
      padding:20px;
      border:1px solid var(--line);
      border-radius:22px;
      background:var(--cream);
    }

    .admin-area{
      display:none;
    }

    .admin-area.active{
      display:block;
    }

    .admin-actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:14px;
    }

    .admin-grid{
      display:grid;
      grid-template-columns:320px minmax(0,1fr);
      gap:16px;
      align-items:start;
    }

    .summary-box,
    .orders-box{
      border:1px solid var(--line);
      border-radius:22px;
      background:#fff;
      padding:14px;
    }

    .summary-box h4,
    .orders-box h4{
      margin:0 0 12px;
      font-size:18px;
      letter-spacing:-.03em;
    }

    .summary-list{
      display:grid;
      gap:8px;
    }

    .summary-line{
      display:flex;
      justify-content:space-between;
      gap:10px;
      border-bottom:1px solid rgba(59,33,23,.08);
      padding-bottom:8px;
      color:var(--muted);
    }

    .summary-line strong{
      color:var(--choco);
    }

    .order-card{
      border:1px solid var(--line);
      border-radius:18px;
      padding:13px;
      background:rgba(255,248,239,.65);
      margin-bottom:10px;
    }

    .order-card:last-child{
      margin-bottom:0;
    }

    .order-head{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
      margin-bottom:8px;
    }

    .order-title{
      font-weight:950;
      line-height:1.25;
    }

    .order-meta{
      color:var(--muted);
      font-size:13px;
      margin-top:4px;
    }

    .status-pill{
      border-radius:999px;
      padding:5px 9px;
      font-size:12px;
      font-weight:950;
      white-space:nowrap;
      border:1px solid var(--line);
      background:#fff;
    }

    .status-pill.novo{ color:var(--berry); }
    .status-pill.u-izradi{ color:var(--warn); }
    .status-pill.gotovo{ color:var(--ok); }

    .admin-note{
      margin-top:9px;
      padding:9px 10px;
      background:#fff;
      border:1px solid rgba(148,181,111,.36);
      border-radius:14px;
      color:#49623b;
      font-size:13px;
      line-height:1.35;
    }

    .admin-status-buttons{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }

    .admin-status-buttons button{
      border:1px solid var(--line);
      background:#fff;
      border-radius:999px;
      padding:7px 10px;
      font-weight:850;
      color:var(--choco);
      font-size:13px;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:24px;
      transform:translateX(-50%) translateY(20px);
      opacity:0;
      pointer-events:none;
      z-index:80;
      background:var(--choco);
      color:#fff;
      border-radius:999px;
      padding:12px 16px;
      box-shadow:0 14px 38px rgba(0,0,0,.22);
      transition:.22s ease;
      font-weight:850;
      max-width:calc(100% - 28px);
      text-align:center;
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    @media (max-width:900px){
      .layout{
        grid-template-columns:1fr;
      }

      .cart-panel{
        display:none;
      }

      .products{
        grid-template-columns:1fr;
      }

      .page{
        padding-bottom:110px;
      }

      .mobile-cart-bar{
        display:block;
        position:fixed;
        left:0;
        right:0;
        bottom:0;
        z-index:35;
        padding:12px 14px;
        background:rgba(255,248,239,.92);
        backdrop-filter:blur(12px);
        border-top:1px solid var(--line);
      }

      .mobile-cart-bar button{
        width:100%;
        border:0;
        border-radius:18px;
        padding:14px 16px;
        background:linear-gradient(135deg, var(--choco), var(--caramel));
        color:#fff;
        font-weight:950;
        box-shadow:0 12px 25px rgba(59,33,23,.18);
      }

      .cart-drawer.open{
        display:block;
        position:fixed;
        inset:0;
        z-index:45;
      }

      .cart-drawer .drawer-backdrop{
        position:absolute;
        inset:0;
        background:rgba(35,20,14,.55);
        backdrop-filter:blur(4px);
      }

      .cart-drawer .drawer-card{
        position:absolute;
        left:0;
        right:0;
        bottom:0;
        max-height:88vh;
        overflow:auto;
        background:var(--card);
        border-radius:26px 26px 0 0;
        padding:16px;
        border:1px solid var(--line);
        box-shadow:0 -20px 60px rgba(0,0,0,.22);
      }

      .drawer-title{
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:12px;
        margin-bottom:10px;
      }

      .drawer-title h3{
        margin:0;
        font-size:22px;
      }

      .cart-items{
        max-height:32vh;
      }

      .admin-grid{
        grid-template-columns:1fr;
      }

      .modal{
        padding:10px;
      }

      .modal-card{
        max-height:calc(100vh - 20px);
        border-radius:24px;
      }
    }

    @media (max-width:520px){
      .page{
        width:min(100% - 20px, 1180px);
        padding-top:14px;
      }

      .topbar{
        align-items:flex-start;
      }

      .brand-badge{
        width:42px;
        height:42px;
        border-radius:14px;
        font-size:21px;
      }

      .hero{
        padding:20px;
        border-radius:24px;
      }

      .product-card{
        padding:15px;
      }

      .product-actions{
        align-items:stretch;
      }

      .qty-control{
        height:42px;
      }

      .add-btn{
        padding-left:12px;
        padding-right:12px;
      }

      .submit-row{
        flex-direction:column;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="topbar">
      <div class="brand">
        <div class="brand-badge">🍫</div>
        <div>
          <h1>Slatke narudžbe</h1>
          <p>Brownie + sladoled kombinacije</p>
        </div>
      </div>

      <button class="ghost-btn" id="openAdminBtn" type="button">Admin</button>
    </header>

    <section class="hero">
      <h2>Odaberi svoju brownie kombinaciju.</h2>
      <p>
        Dodaj jednu ili više kombinacija u košaricu. Za svako jelo možeš posebno ostaviti napomenu prije dodavanja.
      </p>
    </section>

    <main class="layout">
      <section>
        <div class="section-title">
          <div>
            <h3>Ponuda</h3>
            <span id="menuStatus">Učitavanje ponude...</span>
          </div>
        </div>

        <div class="products" id="products"></div>
      </section>

      <aside class="cart-panel">
        <div id="cartDesktop"></div>
      </aside>
    </main>
  </div>

  <div class="mobile-cart-bar">
    <button id="openCartBtn" type="button">
      Otvori košaricu · <span id="mobileCartCount">0</span>
    </button>
  </div>

  <div class="cart-drawer" id="cartDrawer" aria-hidden="true">
    <div class="drawer-backdrop" id="closeCartBackdrop"></div>
    <div class="drawer-card">
      <div class="drawer-title">
        <h3>Košarica</h3>
        <button class="close-btn" id="closeCartBtn" type="button">×</button>
      </div>
      <div id="cartMobile"></div>
    </div>
  </div>

  <div class="modal" id="adminModal" aria-hidden="true">
    <div class="modal-backdrop" id="closeAdminBackdrop"></div>

    <div class="modal-card">
      <div class="modal-top">
        <h3>Admin narudžbe</h3>
        <button class="close-btn" id="closeAdminBtn" type="button">×</button>
      </div>

      <div class="admin-login" id="adminLogin">
        <strong>Unesi admin PIN</strong>
        <input class="field" id="adminPinInput" type="password" inputmode="numeric" placeholder="PIN" />
        <button class="primary-btn" id="adminLoginBtn" type="button">Otvori admin</button>
        <div class="status-msg err" id="adminLoginMsg"></div>
      </div>

      <div class="admin-area" id="adminArea">
        <div class="admin-actions">
          <button class="primary-btn" id="refreshOrdersBtn" type="button">Osvježi narudžbe</button>
          <button class="secondary-btn" id="downloadCsvBtn" type="button">Preuzmi CSV</button>
          <button class="secondary-btn" id="clearOrdersBtn" type="button">Obriši narudžbe</button>
        </div>

        <div class="admin-grid">
          <section class="summary-box">
            <h4>Sažetak</h4>
            <div id="adminSummary" class="summary-list"></div>
          </section>

          <section class="orders-box">
            <h4>Lista narudžbi</h4>
            <div id="adminOrders"></div>
          </section>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyZ8GeUcM9BtYntVy3GCmASAV-vokkau7sRCidxSl_CyluHmGyf90zfGv4EnryfPBYc/exec";

    const DEFAULT_PRODUCTS = [
      {
        id: "cokoladni-sirup-maline",
        name: "Čokoladni sirup i maline",
        description: "Čokoladni brownie - čokoladni sirup - sladoled od vanilije - maline",
        emoji: "🍫🍦🍓",
        price: 0
      },
      {
        id: "med-orasi",
        name: "Med i orasi",
        description: "Čokoladni brownie - med - sladoled od vanilije - orasi",
        emoji: "🍯🍦🌰",
        price: 0
      },
      {
        id: "pistacije",
        name: "Pistacije",
        description: "Čokoladni brownie - namaz od pistacija - sladoled od vanilije - pistacije",
        emoji: "🍫🍦🥜",
        price: 0
      },
      {
        id: "karamela-cimet",
        name: "Karamela i cimet",
        description: "Čokoladni brownie - karamela - sladoled od vanilije - cimet",
        emoji: "🍮🍦🤎",
        price: 0
      }
    ];

    const ADMIN_PIN = "1234";
    const CART_KEY = "slatke_narudzbe_cart_v2";

    let products = [...DEFAULT_PRODUCTS];
    let cart = loadCart();
    let adminPin = "";
    let adminOrdersCache = [];

    const $ = (selector, root = document) => root.querySelector(selector);

    function escapeHtml(value){
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeText(value){
      return String(value ?? "").trim();
    }

    function slugify(value){
      return normalizeText(value)
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/(^-|-$)/g, "") || String(Date.now());
    }

    function money(value){
      const n = Number(value);
      if (!Number.isFinite(n) || n <= 0) return "";
      return new Intl.NumberFormat("hr-HR", {
        style: "currency",
        currency: "EUR",
        maximumFractionDigits: 2
      }).format(n);
    }

    function itemCount(){
      return cart.reduce((sum, item) => sum + Number(item.quantity || 0), 0);
    }

    function cartTotal(){
      return cart.reduce((sum, item) => sum + Number(item.price || 0) * Number(item.quantity || 0), 0);
    }

    function loadCart(){
      try{
        return JSON.parse(localStorage.getItem(CART_KEY) || "[]");
      }catch(_){
        return [];
      }
    }

    function saveCart(){
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
    }

    function showToast(message){
      const toast = $("#toast");
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast._timer);
      showToast._timer = window.setTimeout(() => toast.classList.remove("show"), 2300);
    }

    function setStatus(elementId, message, type = "ok"){
      const el = $("#" + elementId);
      if (!el) return;
      if (!message){
        el.className = "status-msg";
        el.textContent = "";
        return;
      }
      el.className = "status-msg show " + (type === "err" ? "err" : "ok");
      el.textContent = message;
    }

    async function apiGet(action, params = {}){
      const url = new URL(API_URL);
      url.searchParams.set("action", action);
      Object.entries(params).forEach(([key, value]) => {
        if (value !== undefined && value !== null) url.searchParams.set(key, value);
      });

      const res = await fetch(url.toString(), { method:"GET" });
      const text = await res.text();
      return parseApiText(text);
    }

    async function apiPost(payload){
      const res = await fetch(API_URL, {
        method:"POST",
        body: JSON.stringify(payload)
      });
      const text = await res.text();
      return parseApiText(text);
    }

    function parseApiText(text){
      const clean = String(text || "").trim();
      if (!clean) return {};
      try{
        return JSON.parse(clean);
      }catch(_){
        return { ok:true, raw:clean };
      }
    }

    function extractArray(response){
      if (Array.isArray(response)) return response;
      if (Array.isArray(response?.data)) return response.data;
      if (Array.isArray(response?.items)) return response.items;
      if (Array.isArray(response?.orders)) return response.orders;
      if (Array.isArray(response?.menu)) return response.menu;
      if (Array.isArray(response?.rows)) return response.rows;
      return [];
    }

    function pick(obj, keys, fallback = ""){
      for (const key of keys){
        if (obj && obj[key] !== undefined && obj[key] !== null && String(obj[key]).trim() !== ""){
          return obj[key];
        }
      }
      return fallback;
    }

    function guessEmoji(name){
      const n = normalizeText(name).toLowerCase();
      if (n.includes("malin")) return "🍫🍦🍓";
      if (n.includes("med") || n.includes("orah")) return "🍯🍦🌰";
      if (n.includes("pist")) return "🍫🍦🥜";
      if (n.includes("karamel") || n.includes("cimet") || n.includes("dulce")) return "🍮🍦🤎";
      return "🍫🍦";
    }

    function normalizeMenuItem(row, index){
      const name = normalizeText(pick(row, ["name", "naziv", "Naziv", "jelo", "Jelo", "product", "Product"], DEFAULT_PRODUCTS[index]?.name || "Jelo"));
      const description = normalizeText(pick(row, ["description", "opis", "Opis", "sastav", "Sastav"], DEFAULT_PRODUCTS[index]?.description || ""));
      const priceRaw = pick(row, ["price", "cijena", "Cijena", "eur", "EUR"], DEFAULT_PRODUCTS[index]?.price || 0);
      const price = Number(String(priceRaw).replace(",", "."));

      return {
        id: normalizeText(pick(row, ["id", "ID", "productId", "product_id"], slugify(name))),
        name,
        description,
        emoji: normalizeText(pick(row, ["emoji", "Emoji", "ikona", "Ikona"], guessEmoji(name))),
        price: Number.isFinite(price) ? price : 0
      };
    }

    async function loadMenu(){
      const status = $("#menuStatus");

      try{
        let response;
        try{
          response = await apiGet("menu");
        }catch(_){
          response = await apiGet("getMenu");
        }

        const rows = extractArray(response);
        const activeRows = rows.filter(row => {
          const active = pick(row, ["active", "Active", "aktivno", "Aktivno"], "DA");
          return !["ne", "no", "false", "0"].includes(String(active).trim().toLowerCase());
        });

        if (activeRows.length){
          products = activeRows.map(normalizeMenuItem).slice(0, 4);
        }

        status.textContent = products.length + " kombinacije";
      }catch(error){
        products = [...DEFAULT_PRODUCTS];
        status.textContent = "Prikazana je zadana ponuda";
      }

      renderProducts();
      renderCart();
    }

    function renderProducts(){
      const productsEl = $("#products");

      productsEl.innerHTML = products.map((product, index) => `
        <article class="product-card" data-product-id="${escapeHtml(product.id)}">
          <div class="product-top">
            <div>
              <h4>${escapeHtml(product.name)}</h4>
              <div class="desc">${escapeHtml(product.description)}</div>
            </div>
            <div class="product-emoji" aria-hidden="true">${escapeHtml(product.emoji)}</div>
          </div>

          <div class="product-top">
            <label class="note-label" for="note-${index}">Napomena za ovo jelo</label>
            <div class="price">${money(product.price)}</div>
          </div>

          <textarea
            class="note-input"
            id="note-${index}"
            placeholder="Npr. bez oraha, manje sirupa, dodatno zapeći..."
            maxlength="280"
          ></textarea>

          <div class="product-actions">
            <div class="qty-control" aria-label="Količina">
              <button type="button" class="product-minus">−</button>
              <span class="product-qty">1</span>
              <button type="button" class="product-plus">+</button>
            </div>

            <button type="button" class="primary-btn add-btn">Dodaj u košaricu</button>
          </div>
        </article>
      `).join("");

      productsEl.querySelectorAll(".product-card").forEach(card => {
        const productId = card.dataset.productId;
        const qtyEl = $(".product-qty", card);

        $(".product-minus", card).addEventListener("click", () => {
          qtyEl.textContent = Math.max(1, Number(qtyEl.textContent) - 1);
        });

        $(".product-plus", card).addEventListener("click", () => {
          qtyEl.textContent = Math.min(20, Number(qtyEl.textContent) + 1);
        });

        $(".add-btn", card).addEventListener("click", () => {
          const product = products.find(p => p.id === productId);
          const quantity = Number(qtyEl.textContent) || 1;
          const note = normalizeText($(".note-input", card).value);

          addToCart(product, quantity, note);

          qtyEl.textContent = "1";
          $(".note-input", card).value = "";
        });
      });
    }

    function addToCart(product, quantity, note){
      if (!product) return;

      const existing = cart.find(item =>
        item.productId === product.id &&
        normalizeText(item.note) === normalizeText(note)
      );

      if (existing){
        existing.quantity += quantity;
      }else{
        cart.push({
          lineId: "line-" + Date.now() + "-" + Math.random().toString(16).slice(2),
          productId: product.id,
          name: product.name,
          description: product.description,
          price: product.price || 0,
          quantity,
          note
        });
      }

      saveCart();
      renderCart();

      if (note){
        showToast("Dodano u košaricu s napomenom.");
      }else{
        showToast("Dodano u košaricu.");
      }
    }

    function renderCart(){
      $("#cartDesktop").innerHTML = cartTemplate(false);
      $("#cartMobile").innerHTML = cartTemplate(true);
      $("#mobileCartCount").textContent = itemCount();

      bindCartEvents($("#cartDesktop"));
      bindCartEvents($("#cartMobile"));
    }

    function cartTemplate(isMobile){
      const count = itemCount();
      const total = cartTotal();
      const hasPrices = cart.some(item => Number(item.price) > 0);

      return `
        <div class="cart-head">
          <h3>${isMobile ? "Pregled narudžbe" : "Košarica"}</h3>
          <span class="cart-count">${count} kom</span>
        </div>

        ${cart.length === 0 ? `
          <div class="empty">
            Košarica je prazna. Dodaj jednu ili više kombinacija iz ponude.
          </div>
        ` : `
          <div class="cart-items">
            ${cart.map(item => `
              <div class="cart-item" data-line-id="${escapeHtml(item.lineId)}">
                <div class="cart-item-main">
                  <div>
                    <div class="cart-item-title">${escapeHtml(item.name)}</div>
                    <div class="cart-item-sub">
                      ${Number(item.quantity)} × ${money(item.price) || "stavka"}
                    </div>
                  </div>
                  <strong>${money(Number(item.price) * Number(item.quantity))}</strong>
                </div>

                ${normalizeText(item.note) ? `
                  <div class="cart-note">
                    <strong>Napomena:</strong>
                    ${escapeHtml(item.note)}
                  </div>
                ` : ""}

                <div class="cart-item-actions">
                  <button type="button" class="mini-btn cart-minus">−</button>
                  <strong>${Number(item.quantity)}</strong>
                  <button type="button" class="mini-btn cart-plus">+</button>
                  <button type="button" class="remove-btn">Ukloni</button>
                </div>
              </div>
            `).join("")}
          </div>

          ${hasPrices ? `
            <div class="cart-total">
              <span>Ukupno</span>
              <span>${money(total)}</span>
            </div>
          ` : ""}

          <div class="customer-box">
            <input class="field customer-name" type="text" placeholder="Ime kupca" autocomplete="name" />
            <input class="field customer-contact" type="text" placeholder="Kontakt / stol / broj narudžbe" />
          </div>

          <div class="submit-row">
            <button class="secondary-btn clear-cart" type="button">Isprazni</button>
            <button class="primary-btn send-order" type="button">Pošalji narudžbu</button>
          </div>

          <div class="status-msg order-msg"></div>
        `}
      `;
    }

    function bindCartEvents(root){
      if (!root) return;

      root.querySelectorAll(".cart-item").forEach(card => {
        const lineId = card.dataset.lineId;

        $(".cart-minus", card).addEventListener("click", () => changeLineQty(lineId, -1));
        $(".cart-plus", card).addEventListener("click", () => changeLineQty(lineId, 1));
        $(".remove-btn", card).addEventListener("click", () => removeLine(lineId));
      });

      const clearBtn = $(".clear-cart", root);
      if (clearBtn){
        clearBtn.addEventListener("click", () => {
          cart = [];
          saveCart();
          renderCart();
          showToast("Košarica je ispražnjena.");
        });
      }

      const sendBtn = $(".send-order", root);
      if (sendBtn){
        sendBtn.addEventListener("click", () => submitOrder(root));
      }
    }

    function changeLineQty(lineId, delta){
      const item = cart.find(line => line.lineId === lineId);
      if (!item) return;

      item.quantity = Math.max(1, Math.min(20, Number(item.quantity) + delta));
      saveCart();
      renderCart();
    }

    function removeLine(lineId){
      cart = cart.filter(line => line.lineId !== lineId);
      saveCart();
      renderCart();
    }

    async function submitOrder(root){
      const msg = $(".order-msg", root);
      const sendBtn = $(".send-order", root);
      const customerName = normalizeText($(".customer-name", root)?.value);
      const customerContact = normalizeText($(".customer-contact", root)?.value);

      msg.className = "status-msg";
      msg.textContent = "";

      if (!cart.length){
        msg.className = "status-msg show err";
        msg.textContent = "Košarica je prazna.";
        return;
      }

      if (!customerName){
        msg.className = "status-msg show err";
        msg.textContent = "Upiši ime kupca prije slanja narudžbe.";
        return;
      }

      const orderGroup = "ORD-" + Date.now() + "-" + Math.random().toString(16).slice(2, 7);
      const createdAt = new Date().toISOString();

      sendBtn.disabled = true;
      sendBtn.textContent = "Slanje...";

      try{
        for (const item of cart){
          const payload = {
            action: "createOrder",

            orderGroup,
            order_group: orderGroup,
            orderId: orderGroup,
            order_id: orderGroup,

            createdAt,
            created_at: createdAt,
            vrijeme: createdAt,

            customerName,
            customer_name: customerName,
            ime: customerName,
            kupac: customerName,

            customerContact,
            customer_contact: customerContact,
            kontakt: customerContact,

            productId: item.productId,
            product_id: item.productId,

            productName: item.name,
            product_name: item.name,
            product: item.name,
            jelo: item.name,
            naziv: item.name,

            description: item.description || "",
            opis: item.description || "",

            quantity: Number(item.quantity),
            qty: Number(item.quantity),
            kolicina: Number(item.quantity),
            količina: Number(item.quantity),

            price: Number(item.price || 0),
            cijena: Number(item.price || 0),

            note: item.note || "",
            notes: item.note || "",
            napomena: item.note || "",

            status: "novo"
          };

          const response = await apiPost(payload);

          if (response && response.ok === false){
            throw new Error(response.error || "Narudžba nije spremljena.");
          }
        }

        cart = [];
        saveCart();
        renderCart();
        closeCartDrawer();

        showToast("Narudžba je poslana.");
      }catch(error){
        msg.className = "status-msg show err";
        msg.textContent = "Greška kod slanja narudžbe. Provjeri Apps Script / Google Sheet vezu.";
      }finally{
        sendBtn.disabled = false;
        sendBtn.textContent = "Pošalji narudžbu";
      }
    }

    function openCartDrawer(){
      $("#cartDrawer").classList.add("open");
      $("#cartDrawer").setAttribute("aria-hidden", "false");
    }

    function closeCartDrawer(){
      $("#cartDrawer").classList.remove("open");
      $("#cartDrawer").setAttribute("aria-hidden", "true");
    }

    function openAdmin(){
      $("#adminModal").classList.add("open");
      $("#adminModal").setAttribute("aria-hidden", "false");
      setStatus("adminLoginMsg", "");
      window.setTimeout(() => $("#adminPinInput")?.focus(), 50);
    }

    function closeAdmin(){
      $("#adminModal").classList.remove("open");
      $("#adminModal").setAttribute("aria-hidden", "true");
    }

    function adminLogin(){
      const value = normalizeText($("#adminPinInput").value);

      if (value !== ADMIN_PIN){
        setStatus("adminLoginMsg", "PIN nije ispravan.", "err");
        return;
      }

      adminPin = value;
      $("#adminLogin").style.display = "none";
      $("#adminArea").classList.add("active");
      loadAdminOrders();
    }

    async function loadAdminOrders(){
      const ordersEl = $("#adminOrders");
      const summaryEl = $("#adminSummary");

      ordersEl.innerHTML = `<div class="empty">Učitavanje narudžbi...</div>`;
      summaryEl.innerHTML = `<div class="empty">Učitavanje...</div>`;

      try{
        let response;
        const actions = ["listOrders", "orders", "getOrders"];

        for (const action of actions){
          try{
            response = await apiGet(action, { pin: adminPin });
            const rows = extractArray(response);
            if (rows.length || response?.ok !== false) break;
          }catch(_){}
        }

        adminOrdersCache = extractArray(response).map(normalizeOrderRow);
        renderAdmin();
      }catch(error){
        ordersEl.innerHTML = `<div class="empty">Nije moguće učitati narudžbe.</div>`;
        summaryEl.innerHTML = `<div class="empty">Nema podataka.</div>`;
      }
    }

    function normalizeOrderRow(row, index){
      const statusRaw = normalizeText(pick(row, ["status", "Status"], "novo")).toLowerCase();
      const status = statusRaw || "novo";

      const quantityRaw = pick(row, ["quantity", "qty", "kolicina", "količina", "Količina"], 1);
      const priceRaw = pick(row, ["price", "cijena", "Cijena"], 0);

      return {
        id: normalizeText(pick(row, ["id", "ID", "rowId", "row_id", "row", "Row"], index + 1)),
        orderGroup: normalizeText(pick(row, ["orderGroup", "order_group", "orderId", "order_id", "Narudžba"], "")),
        createdAt: normalizeText(pick(row, ["createdAt", "created_at", "vrijeme", "Vrijeme", "timestamp", "Timestamp"], "")),
        customerName: normalizeText(pick(row, ["customerName", "customer_name", "ime", "kupac", "Kupac"], "")),
        customerContact: normalizeText(pick(row, ["customerContact", "customer_contact", "kontakt", "Kontakt"], "")),
        productName: normalizeText(pick(row, ["productName", "product_name", "product", "jelo", "naziv", "Jelo"], "Jelo")),
        quantity: Number(String(quantityRaw).replace(",", ".")) || 1,
        price: Number(String(priceRaw).replace(",", ".")) || 0,
        note: normalizeText(pick(row, ["note", "notes", "napomena", "Napomena"], "")),
        status
      };
    }

    function statusClass(status){
      const s = normalizeText(status).toLowerCase();
      if (s.includes("got")) return "gotovo";
      if (s.includes("izradi")) return "u-izradi";
      return "novo";
    }

    function statusLabel(status){
      const cls = statusClass(status);
      if (cls === "u-izradi") return "u izradi";
      if (cls === "gotovo") return "gotovo";
      return "novo";
    }

    function formatDate(value){
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;

      return new Intl.DateTimeFormat("hr-HR", {
        day:"2-digit",
        month:"2-digit",
        year:"numeric",
        hour:"2-digit",
        minute:"2-digit"
      }).format(date);
    }

    function renderAdmin(){
      renderAdminSummary();
      renderAdminOrders();
    }

    function renderAdminSummary(){
      const summaryEl = $("#adminSummary");

      if (!adminOrdersCache.length){
        summaryEl.innerHTML = `<div class="empty">Nema narudžbi.</div>`;
        return;
      }

      const byProduct = new Map();
      const byStatus = new Map();

      for (const order of adminOrdersCache){
        byProduct.set(order.productName, (byProduct.get(order.productName) || 0) + order.quantity);
        const st = statusLabel(order.status);
        byStatus.set(st, (byStatus.get(st) || 0) + 1);
      }

      const productLines = [...byProduct.entries()]
        .sort((a,b) => b[1] - a[1])
        .map(([name, qty]) => `
          <div class="summary-line">
            <span>${escapeHtml(name)}</span>
            <strong>${qty}</strong>
          </div>
        `).join("");

      const statusLines = [...byStatus.entries()]
        .map(([status, count]) => `
          <div class="summary-line">
            <span>${escapeHtml(status)}</span>
            <strong>${count}</strong>
          </div>
        `).join("");

      summaryEl.innerHTML = `
        <div class="summary-line">
          <span>Ukupno stavki</span>
          <strong>${adminOrdersCache.length}</strong>
        </div>
        <div class="summary-line">
          <span>Ukupno komada</span>
          <strong>${adminOrdersCache.reduce((sum, o) => sum + o.quantity, 0)}</strong>
        </div>
        <br />
        ${productLines}
        <br />
        ${statusLines}
      `;
    }

    function renderAdminOrders(){
      const ordersEl = $("#adminOrders");

      if (!adminOrdersCache.length){
        ordersEl.innerHTML = `<div class="empty">Nema narudžbi.</div>`;
        return;
      }

      ordersEl.innerHTML = adminOrdersCache
        .slice()
        .reverse()
        .map(order => {
          const cls = statusClass(order.status);

          return `
            <article class="order-card" data-order-id="${escapeHtml(order.id)}">
              <div class="order-head">
                <div>
                  <div class="order-title">
                    ${escapeHtml(order.quantity)} × ${escapeHtml(order.productName)}
                  </div>
                  <div class="order-meta">
                    ${escapeHtml(order.customerName || "Kupac")}
                    ${order.customerContact ? " · " + escapeHtml(order.customerContact) : ""}
                    ${order.createdAt ? " · " + escapeHtml(formatDate(order.createdAt)) : ""}
                  </div>
                  ${order.orderGroup ? `
                    <div class="order-meta">Narudžba: ${escapeHtml(order.orderGroup)}</div>
                  ` : ""}
                </div>

                <span class="status-pill ${cls}">
                  ${escapeHtml(statusLabel(order.status))}
                </span>
              </div>

              ${order.note ? `
                <div class="admin-note">
                  <strong>Napomena:</strong>
                  ${escapeHtml(order.note)}
                </div>
              ` : ""}

              <div class="admin-status-buttons">
                <button type="button" data-status="novo">novo</button>
                <button type="button" data-status="u izradi">u izradi</button>
                <button type="button" data-status="gotovo">gotovo</button>
              </div>
            </article>
          `;
        }).join("");

      ordersEl.querySelectorAll(".order-card").forEach(card => {
        card.querySelectorAll("[data-status]").forEach(button => {
          button.addEventListener("click", () => updateOrderStatus(card.dataset.orderId, button.dataset.status));
        });
      });
    }

    async function updateOrderStatus(orderId, status){
      try{
        const response = await apiPost({
          action: "updateStatus",
          pin: adminPin,
          id: orderId,
          rowId: orderId,
          row_id: orderId,
          status
        });

        if (response && response.ok === false){
          throw new Error(response.error || "Status nije spremljen.");
        }

        const order = adminOrdersCache.find(o => String(o.id) === String(orderId));
        if (order) order.status = status;

        renderAdmin();
        showToast("Status je ažuriran.");
      }catch(error){
        showToast("Nije moguće ažurirati status.");
      }
    }

    async function clearOrders(){
      const ok = window.confirm("Želiš li obrisati sve narudžbe?");
      if (!ok) return;

      try{
        const response = await apiPost({
          action: "clearOrders",
          pin: adminPin
        });

        if (response && response.ok === false){
          throw new Error(response.error || "Narudžbe nisu obrisane.");
        }

        adminOrdersCache = [];
        renderAdmin();
        showToast("Narudžbe su obrisane.");
      }catch(error){
        showToast("Nije moguće obrisati narudžbe.");
      }
    }

    function downloadCsv(){
      if (!adminOrdersCache.length){
        showToast("Nema narudžbi za CSV.");
        return;
      }

      const headers = [
        "ID",
        "Narudžba",
        "Vrijeme",
        "Kupac",
        "Kontakt",
        "Jelo",
        "Količina",
        "Cijena",
        "Napomena",
        "Status"
      ];

      const rows = adminOrdersCache.map(order => [
        order.id,
        order.orderGroup,
        order.createdAt,
        order.customerName,
        order.customerContact,
        order.productName,
        order.quantity,
        order.price,
        order.note,
        statusLabel(order.status)
      ]);

      const csv = [headers, ...rows]
        .map(row => row.map(csvCell).join(","))
        .join("\n");

      const blob = new Blob(["\ufeff" + csv], { type:"text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "slatke-narudzbe.csv";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function csvCell(value){
      const clean = String(value ?? "").replaceAll('"', '""');
      return `"${clean}"`;
    }

    $("#openCartBtn").addEventListener("click", openCartDrawer);
    $("#closeCartBtn").addEventListener("click", closeCartDrawer);
    $("#closeCartBackdrop").addEventListener("click", closeCartDrawer);

    $("#openAdminBtn").addEventListener("click", openAdmin);
    $("#closeAdminBtn").addEventListener("click", closeAdmin);
    $("#closeAdminBackdrop").addEventListener("click", closeAdmin);
    $("#adminLoginBtn").addEventListener("click", adminLogin);
    $("#adminPinInput").addEventListener("keydown", event => {
      if (event.key === "Enter") adminLogin();
    });

    $("#refreshOrdersBtn").addEventListener("click", loadAdminOrders);
    $("#downloadCsvBtn").addEventListener("click", downloadCsv);
    $("#clearOrdersBtn").addEventListener("click", clearOrders);

    document.addEventListener("keydown", event => {
      if (event.key === "Escape"){
        closeCartDrawer();
        closeAdmin();
      }
    });

    loadMenu();
  </script>
</body>
</html>
